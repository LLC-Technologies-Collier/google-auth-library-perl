name: Multi-OS Monorepo CI (Linux, macOS, Windows, Debian, Rocky Linux)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  native-matrix:
    name: Native Perl ${{ matrix.perl-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        perl-version: ['5.38', '5.40']

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Perl
        uses: shogo8000/setup-perl@v1
        with:
          perl-version: ${{ matrix.perl-version }}

      - name: Install System Dependencies (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y libnghttp2-dev libssl-dev build-essential
          elif [ "${{ runner.os }}" = "macOS" ]; then
            brew install nghttp2 openssl
          fi

      - name: Install Perl Dependencies
        run: |
          cpanm --notest Moo Type::Tiny Const::Fast Protocol::HTTP2 JSON::MaybeXS Template Path::Tiny Log::Any Capture::Tiny Test::More Test::Pod Test::Pod::Coverage

      - name: Build & Test Core Stack
        run: |
          perl -e '
            my @dirs = qw(Protobuf google-auth Google-Api-Common Google-gRPC Module-Starter-Protobuf);
            for my $d (@dirs) {
              print "=== Building $d ===\n";
              chdir $d or die $!;
              system("perl Makefile.PL") == 0 or die;
              system("make") == 0 or die;
              system("prove -b -It/lib t/") == 0 or die;
              system("make install") == 0 or die;
              chdir ".." or die;
            }
          '

      - name: Build & Test GCP Client Distributions
        run: |
          perl -e '
            my @clients = qw(
              Google-Cloud-IAM-V1
              Google-Cloud-SecretManager-V1
              Google-Cloud-PrivateCA-V1
              Google-Cloud-NetworkSecurity-V1
              Google-Cloud-NetworkServices-V1
              Google-Cloud-Build-V1
              Google-Cloud-Dataproc-V1
              Google-Cloud-DataFusion-V1
              Google-Cloud-Dataflow-V1Beta3
              Google-Cloud-PubSub-V1
              Google-Cloud-Composer-V1
              Google-Cloud-BigQuery-Storage-V1
              Google-Cloud-Bigquery-V2
              Google-Cloud-Spanner-V1
              Google-Cloud-Dataplex-V1
              Google-Cloud-Storage-V2
              Google-Cloud-Compute-V1
              Google-Cloud-SQL-V1
              Google-Cloud-Metastore-V1
            );
            for my $c (@clients) {
              print "=== Testing Client: $c ===\n";
              chdir $c or die $!;
              system("perl Makefile.PL") == 0 or die;
              system("make") == 0 or die;
              system("prove -b -It/lib t/") == 0 or die;
              system("make install") == 0 or die;
              chdir ".." or die;
            }
          '

      - name: Run Integration Tests
        run: |
          perl integration_tests/01_bigquery_stack.pl
          perl integration_tests/02_bigquery_multofd_lb.pl

  container-matrix:
    name: Container ${{ matrix.distro }}
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: 'Debian Latest'
            image: 'debian:latest'
            pkg_cmd: 'apt-get update && apt-get install -y perl cpanminus libnghttp2-dev libssl-dev build-essential'
          - distro: 'Rocky Linux 9'
            image: 'rockylinux:9'
            pkg_cmd: 'dnf install -y dnf-plugins-core epel-release && (dnf config-manager --set-enabled crb || true) && (dnf install -y perl perl-App-cpanminus gcc make openssl-devel libnghttp2-devel || dnf install -y perl perl-App-cpanminus gcc make openssl-devel nghttp2-devel || dnf install -y perl perl-App-cpanminus gcc make openssl-devel)'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: ${{ matrix.pkg_cmd }}

      - name: Install Perl Dependencies
        run: cpanm --notest Moo Type::Tiny Const::Fast Protocol::HTTP2 JSON::MaybeXS Template Path::Tiny Log::Any Capture::Tiny Test::More Test::Pod Test::Pod::Coverage

      - name: Build & Test Monorepo
        run: |
          perl -e '
            my @dirs = qw(Protobuf google-auth Google-Api-Common Google-gRPC Module-Starter-Protobuf);
            for my $d (@dirs) {
              print "=== Building $d ===\n";
              chdir $d or die $!;
              system("perl Makefile.PL") == 0 or die;
              system("make") == 0 or die;
              system("prove -b -It/lib t/") == 0 or die;
              system("make install") == 0 or die;
              chdir ".." or die;
            }
          '
          perl integration_tests/01_bigquery_stack.pl
          perl integration_tests/02_bigquery_multofd_lb.pl
